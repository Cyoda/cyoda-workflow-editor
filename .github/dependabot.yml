version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: "staging"
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: ["minor", "patch"]
      production-minor-patch:
        dependency-type: production
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: /
    target-branch: "staging"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
