name: Release Preflight

on:
  push:
    branches:
      - staging
      - release/**
  pull_request:
    branches:
      - main
      - staging
      - release/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    if: >-
      github.event_name != 'pull_request'
      || github.head_ref == 'staging'
      || github.base_ref == 'staging'
      || github.base_ref == 'main'
      || startsWith(github.head_ref, 'release/')
      || startsWith(github.base_ref, 'release/')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Fetch base branch for changeset status
        run: git fetch --no-tags origin +refs/heads/main:refs/heads/main

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `changeset status` exits 1 when packages changed since baseBranch (main)
      # but no changesets are present — the correct "you forgot a changeset" gate
      # on feature/staging PRs. On the Changesets "Version packages" branch that
      # condition is a false positive (versions are bumped, changesets consumed),
      # so skip the status check there while still running the rest of preflight.
      - name: Show Changesets status
        if: github.head_ref != 'changeset-release/main'
        run: pnpm exec changeset status

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Release metadata and publish dry-run checks
        run: pnpm release:preflight
