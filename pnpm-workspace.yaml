packages:
  - "packages/*"
  - "apps/*"

# Shared dependency catalog — pinned to current resolved values.
# Exact versions; no carets or tildes permitted (peers may keep ranges).
catalog:
  "@changesets/cli": 2.31.0
  "@playwright/test": 1.60.0
  "@testing-library/dom": 10.4.1
  "@testing-library/react": 16.3.2
  "@types/node": 25.9.2
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@eslint/js": 10.0.1
  "@typescript-eslint/eslint-plugin": 8.61.0
  "@typescript-eslint/parser": 8.61.0
  "@vitejs/plugin-react": 6.0.2
  "@vitest/coverage-v8": 4.1.8
  eslint: 10.4.1
  fast-check: 4.8.0
  elkjs: 0.11.1
  immer: 11.1.8
  jsdom: 29.1.1
  jsonc-parser: 3.3.1
  monaco-editor: 0.55.1
  prettier: 3.8.4
  typescript-eslint: 8.61.0
  react: 19.2.7
  react-dom: 19.2.7
  reactflow: 11.11.4
  tsup: 8.5.1
  typescript: 6.0.3
  uuid: 14.0.0
  vite: 8.0.16
  vitest: 4.1.8
  zod: 4.4.3

# Supply-chain hardening (pnpm 10)
# 14 days = 14*24*60 = 20160 minutes. No version younger than this enters the lockfile.
minimumReleaseAge: 20160
minimumReleaseAgeExclude:
  - "@cyoda/*"
  # Exception: esbuild is forced to >=0.28.1 via pnpm.overrides to clear the
  # GHSA-67mh-4wv8-2f99 advisory (0.27.x is vulnerable; tsup/vite pull it in).
  # The patched version may be <14 days old, so the cooldown is excluded here.
  - esbuild
  - "@esbuild/*"
# Only these packages may run install lifecycle scripts (pnpm 10 blocks all others).
# Seeded with esbuild; add any package pnpm reports under "Ignored build scripts" in Step 5.
onlyBuiltDependencies:
  - esbuild
