packages:
  - "packages/*"
  - "apps/*"

# Shared dependency catalog — Tasks 3-7 bump versions here only.
# Exact versions pinned to current resolved values (no upgrades in this commit).
# Note: monaco-editor is 0.52.2; workflow-monaco devDep moves 0.50.0→0.52.2 (the one permitted change).
catalog:
  "@changesets/cli": 2.31.0
  "@playwright/test": 1.60.0
  "@testing-library/react": 14.3.1
  "@types/node": 25.9.2
  "@types/react": 18.3.28
  "@types/react-dom": 18.3.7
  "@eslint/js": 10.0.1
  "@typescript-eslint/eslint-plugin": 8.61.0
  "@typescript-eslint/parser": 8.61.0
  "@vitejs/plugin-react": 6.0.2
  "@vitest/coverage-v8": 4.1.8
  eslint: 10.4.1
  fast-check: 4.8.0
  elkjs: 0.11.1
  immer: 11.1.8
  jsdom: 29.1.1
  jsonc-parser: 3.3.1
  monaco-editor: 0.52.2
  prettier: 3.8.4
  typescript-eslint: 8.61.0
  react: 18.3.1
  react-dom: 18.3.1
  reactflow: 11.11.4
  tsup: 8.5.1
  typescript: 6.0.3
  uuid: 14.0.0
  vite: 8.0.16
  vitest: 4.1.8
  zod: 3.25.76
  zod-to-json-schema: 3.25.2

# Supply-chain hardening (pnpm 10)
# 14 days = 14*24*60 = 20160 minutes. No version younger than this enters the lockfile.
minimumReleaseAge: 20160
minimumReleaseAgeExclude:
  - "@cyoda/*"
  # Exception: these are security-patched transitive deps forced by pnpm.overrides
  # (commit 7e9baf9). Their patched versions are <14 days old and their cooled
  # predecessors are still vulnerable, so the cooldown cannot apply. Transitional —
  # removed in Task 9 when the overrides are pruned and vite 8 / jsdom 29 supersede them.
  - form-data
  - esbuild
  - "@esbuild/*"
# Only these packages may run install lifecycle scripts (pnpm 10 blocks all others).
# Seeded with esbuild; add any package pnpm reports under "Ignored build scripts" in Step 5.
onlyBuiltDependencies:
  - esbuild
